name: Gate - Security Scan

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gate-security-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-scan:
    name: security:scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.3.1

      - name: Run Security Scan Gate
        run: npm run security:scan
