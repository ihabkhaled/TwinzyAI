name: Gate - Knowledge

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gate-knowledge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  knowledge:
    name: knowledge
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Rebuild Knowledge Plane
        run: npm run knowledge:build

      - name: Verify No Generated Drift
        run: git diff --exit-code -- .ai

      - name: Validate Knowledge
        run: npm run knowledge:validate

      - name: Golden Task Benchmark
        run: npm run knowledge:benchmark

      - name: Knowledge Report
        run: npm run knowledge:report
