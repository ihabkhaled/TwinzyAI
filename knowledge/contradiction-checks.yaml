# Contradiction management. Two sections:
#   checks   — machine-verifiable assertions the compiler runs every build
#   registry — recorded open contradictions (never merged silently); critical
#              entries are injected into .ai/BOOTSTRAP.md / .ai/HOT_MEMORY.md
#              until resolved. Update status here when resolving.
checks:
  - id: no-hardcoded-gemini-model
    severity: critical
    kind: assert-absent
    pattern: 'gemini-[0-9]'
    paths: [apps/api/src, apps/web/src, packages/shared/src]
    excludePathContains: ['.test.', /tests/, /benchmark/]
    message: Model ids must come from env (GEMINI_MODEL / AI_ROUTE_*), never source.

  - id: no-ts-enum-keyword
    severity: critical
    kind: assert-absent
    pattern: '\benum\s+[A-Za-z_$][\w$]*\s*\{'
    paths: [apps/api/src, apps/web/src, packages/shared/src]
    excludePathContains: []
    message: TypeScript enum keyword is banned — as-const objects + derived types.

  - id: no-eslint-suppression
    severity: critical
    kind: assert-absent
    # Matches actual directive comments (// eslint-disable, /* eslint-disable),
    # not prose that merely mentions the ban.
    pattern: '(?:\/\/|\/\*)\s*eslint-(?:disable|enable)'
    paths: [apps/api/src, apps/web/src, packages/shared/src, scripts, eslint]
    excludePathContains: []
    message: Inline ESLint suppression is forbidden with no exceptions.

  - id: safety-constants-exist
    severity: critical
    kind: assert-file-exists
    file: packages/shared/src/constants/safety.constants.ts
    message: The shared forbidden-wording lists must exist (AI-safety boundary).

  - id: image-wipe-in-finally
    severity: critical
    kind: assert-present
    file: apps/api/src/modules/game/application/analyze-game.use-case.ts
    pattern: finally
    message: The analyze path must keep its wipe-in-finally image lifecycle.

  - id: env-example-price-mirror
    severity: high
    kind: env-example-mirror
    serverKey: PAYMENT_PRICE_VALUE
    publicKey: NEXT_PUBLIC_PAYMENT_PRICE_VALUE
    message: .env.example display price must mirror the server price.

registry:
  - id: paywall-policy-supersession
    severity: critical
    status: open
    owner: repository owner
    statement: >-
      CLAUDE.md Twinzy constraint #1, rules/00 rule 42, and all agent mirrors
      still said "no payment capture ever", while an owner-approved 2026-07-12
      supersession (docs/features/paypal-donations-and-paid-results/
      22-go-no-go.md: SANDBOX-GO, LIVE-conditional) shipped an env-gated
      PayPal Orders v2 paywall (capture-at-consumption, no persistence,
      webhooks optional). Policy texts are being updated to the recorded
      decision; the paywall stays OFF by default (blank credentials = free).
    sources:
      - CLAUDE.md
      - rules/00-non-negotiable-rules.md
      - docs/features/paypal-donations-and-paid-results/22-go-no-go.md
      - apps/api/src/modules/payments/application/payment-gate.service.ts
    resolution: >-
      Canonical texts updated in the ai-knowledge-os delivery stream to state
      the recorded supersession. Remaining open items tracked as
      paywall-live-conditions.

  - id: paywall-live-conditions
    severity: critical
    status: open
    owner: repository owner
    statement: >-
      LIVE paywall is NOT approved. 22-go-no-go.md records four open LIVE
      conditions: deployed HTTPS origin; PayPal Business account +
      PAYPAL_ENV=live only after sandbox sign-off; owner-approved revision of
      the "completely free / never ask for payment details" copy in en+ar
      (i18n messages still claim free while payment-step copy charges
      {price}); a recorded live smoke test. Commit 5cd43f6 documents a
      premature live attempt failing with COMPLIANCE_VIOLATION.
    sources:
      - docs/features/paypal-donations-and-paid-results/22-go-no-go.md
      - apps/web/src/packages/i18n/messages/en.json
    resolution: >-
      Do not set PAYPAL_ENV=live or ship paywall-on config until all four
      conditions are recorded as met and the copy revision is owner-approved.

  - id: paywall-artifact-debt
    severity: high
    status: open
    owner: repository owner
    statement: >-
      The paywall program shipped with 6 of the required phase artifacts
      (00, 06, 19-threat-model x2, 22, 25); phases 03/08/09/10/11/12/13/15/17/23
      are missing per CLAUDE.md's artifact policy. Process debt to backfill.
    sources:
      - docs/features/paypal-donations-and-paid-results/
      - CLAUDE.md
    resolution: Backfill compact artifacts or record an owner-approved waiver.
