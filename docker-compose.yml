services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: twinzy-api:local
    ports:
      - '${API_PORT:-4000}:4000'
    environment:
      NODE_ENV: production
      API_PORT: 4000
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-}
      GEMINI_FALLBACK_MODELS: ${GEMINI_FALLBACK_MODELS:-}
      GEMINI_TIMEOUT_MS: ${GEMINI_TIMEOUT_MS:-30000}
      GEMINI_STREAM_IDLE_TIMEOUT_MS: ${GEMINI_STREAM_IDLE_TIMEOUT_MS:-60000}
      MAX_IMAGE_SIZE_BYTES: ${MAX_IMAGE_SIZE_BYTES:-5242880}
      ENABLE_CLAMAV: ${ENABLE_CLAMAV:-false}
      CLAMAV_HOSTS: ${CLAMAV_HOSTS:-clamav,127.0.0.1}
      CLAMAV_PORT: 3310
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # No volumes on purpose: uploads must never persist.

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
    image: twinzy-web:local
    ports:
      - '${WEB_PORT:-3000}:3000'
    environment:
      NODE_ENV: production
    depends_on:
      - api
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  clamav:
    image: clamav/clamav:stable
    profiles:
      - clamav
    # clamd is reached only over the internal compose network — not published.
    expose:
      - '3310'
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
