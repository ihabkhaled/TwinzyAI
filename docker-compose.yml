services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: twinzy-api:local
    ports:
      - '${API_PORT:-3001}:3001'
    environment:
      NODE_ENV: production
      API_PORT: 3001
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-}
      GEMINI_TIMEOUT_MS: ${GEMINI_TIMEOUT_MS:-30000}
      MAX_IMAGE_SIZE_BYTES: ${MAX_IMAGE_SIZE_BYTES:-5242880}
      ENABLE_CLAMAV: ${ENABLE_CLAMAV:-false}
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
    restart: unless-stopped
    # No volumes on purpose: uploads must never persist.

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001}
    image: twinzy-web:local
    ports:
      - '${WEB_PORT:-3000}:3000'
    environment:
      NODE_ENV: production
    depends_on:
      - api
    restart: unless-stopped

  clamav:
    image: clamav/clamav:stable
    profiles:
      - clamav
    ports:
      - '3310:3310'
    restart: unless-stopped
